services:
  db:
    image: postgres:17
    container_name: homestay-db
    environment:
      POSTGRES_DB: homestay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - homestay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homestay"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: homestay-backend
    ports:
      - "8000:8000"
    environment:
      HOMESTAY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/homestay
      HOMESTAY_DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/homestay
      HOMESTAY_JWT_SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: homestay-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  homestay-pgdata:
