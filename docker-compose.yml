services:
  db:
    image: postgres:17
    container_name: homestay-db
    environment:
      POSTGRES_DB: homestay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # ports not exposed: only backend (same docker network) needs the db
    volumes:
      - homestay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homestay"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: homestay-backend
    # ports not exposed: frontend proxies to it over the docker network
    environment:
      HOMESTAY_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/homestay
      HOMESTAY_DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/homestay
      HOMESTAY_JWT_SECRET_KEY: change-me-in-production
      HOMESTAY_MEDIA_ROOT: /media
      # Booking agent — values come from the gitignored .env (compose interpolation)
      HOMESTAY_OPENAI_BASE_URL: ${HOMESTAY_OPENAI_BASE_URL:-https://api.openai.com/v1}
      HOMESTAY_OPENAI_API_KEY: ${HOMESTAY_OPENAI_API_KEY:-}
      HOMESTAY_AGENT_MODEL: ${HOMESTAY_AGENT_MODEL:-gpt-4o-mini}
      HOMESTAY_AGENT_ALLOWED_SENDERS: ${HOMESTAY_AGENT_ALLOWED_SENDERS:-}
      HOMESTAY_AGENT_ADMINS: ${HOMESTAY_AGENT_ADMINS:-}
      HOMESTAY_ZALO_BOT_TOKEN: ${HOMESTAY_ZALO_BOT_TOKEN:-}
    volumes:
      # shared with frontend's public/photos; backend writes, frontend reads
      - homestay-media:/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: homestay-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    volumes:
      # same volume as backend /media; serves uploaded media as /photos/*
      - homestay-media:/app/public/photos
    depends_on:
      - backend

volumes:
  homestay-pgdata:
  homestay-media:
